---
- name: Check if rp manifest exists
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.config/rp/manifest.yaml"
  register: rp_manifest

- name: Run rp bootstrap
  ansible.builtin.command: /opt/homebrew/bin/rp bootstrap
  environment:
    PATH: "/opt/homebrew/bin:/opt/homebrew/sbin:{{ ansible_facts.env.PATH }}"
  register: rp_result
  when: rp_manifest.stat.exists
  changed_when: rp_result.stdout | default('') | length > 0

- name: Show rp bootstrap output
  ansible.builtin.debug:
    msg: "{{ rp_result.stdout_lines }}"
  when: rp_manifest.stat.exists and rp_result.stdout_lines | default([]) | length > 0

- name: Warn if rp manifest missing
  ansible.builtin.debug:
    msg: "⚠️  rp manifest not found at ~/.config/rp/manifest.yaml — run 'chezmoi apply' first to pull dotfiles-private"
  when: not rp_manifest.stat.exists
