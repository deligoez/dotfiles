---
# ── TextEdit ──
- name: "TextEdit: Use plain text mode by default"
  community.general.osx_defaults:
    domain: com.apple.TextEdit
    key: RichText
    type: int
    value: 0

- name: "TextEdit: Set plain text encoding to UTF-8"
  community.general.osx_defaults:
    domain: com.apple.TextEdit
    key: PlainTextEncoding
    type: int
    value: 4

- name: "TextEdit: Set plain text write encoding to UTF-8"
  community.general.osx_defaults:
    domain: com.apple.TextEdit
    key: PlainTextEncodingForWrite
    type: int
    value: 4

# ── Safari ──
# Safari is sandboxed; writing to com.apple.Safari requires Full Disk
# Access for the calling shell, which we can't grant from Ansible.
# Treat the failure as non-fatal so the rest of the playbook continues.
- name: "Safari: Show features for web developers"
  community.general.osx_defaults:
    domain: com.apple.Safari
    key: com.apple.Safari.ContentPageGroupIdentifier.WebKit2DeveloperExtrasEnabled
    type: bool
    value: true
  failed_when: false
  register: safari_devtools

- name: Remind about Safari Full Disk Access
  ansible.builtin.debug:
    msg: >-
      ⚠️  Safari developer features couldn't be set automatically (sandbox).
      Either enable Develop menu manually (Safari → Settings → Advanced),
      or grant Terminal Full Disk Access and re-run.
  when: safari_devtools is failed
