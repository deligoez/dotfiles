---
# Kanata setup: LaunchDaemon for boot + driver reminder
# Requires: kanata (brew) + karabiner-elements (cask, ships VirtualHIDDevice driver)
# Config lives at ~/.config/kanata/kanata.kbd (deployed by chezmoi)

- name: Check Kanata binary is installed
  ansible.builtin.stat:
    path: /opt/homebrew/bin/kanata
  register: kanata_bin

- name: Fail early if Kanata not installed
  ansible.builtin.fail:
    msg: "Kanata not found. Run with --tags homebrew first, or install: brew install kanata"
  when: not kanata_bin.stat.exists

- name: Remind about Karabiner driver activation
  ansible.builtin.debug:
    msg: |
      ⚠️  Kanata requires the Karabiner VirtualHIDDevice driver.
      First-time setup:
        1. Open Karabiner-Elements.app once (triggers the driver install prompt)
        2. System Settings > Privacy & Security > approve "Karabiner" driver extension
        3. Reboot if prompted

- name: Install Kanata LaunchDaemon plist
  ansible.builtin.copy:
    dest: /Library/LaunchDaemons/com.kanata.plist
    owner: root
    group: wheel
    mode: '0644'
    content: |
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
      <plist version="1.0">
      <dict>
        <key>Label</key>
        <string>com.kanata</string>
        <key>ProgramArguments</key>
        <array>
          <string>/opt/homebrew/bin/kanata</string>
          <string>-c</string>
          <string>/Users/{{ ansible_facts.env.USER }}/.config/kanata/kanata.kbd</string>
        </array>
        <key>RunAtLoad</key>
        <true/>
        <key>KeepAlive</key>
        <true/>
        <key>StandardOutPath</key>
        <string>/var/log/kanata.log</string>
        <key>StandardErrorPath</key>
        <string>/var/log/kanata.err</string>
      </dict>
      </plist>
  become: true
  register: kanata_plist

- name: Unload existing Kanata LaunchDaemon (idempotent reload)
  ansible.builtin.command: launchctl bootout system/com.kanata
  become: true
  when: kanata_plist is changed
  failed_when: false
  changed_when: false

- name: Load Kanata LaunchDaemon
  ansible.builtin.command: launchctl bootstrap system /Library/LaunchDaemons/com.kanata.plist
  become: true
  when: kanata_plist is changed
