---
# ── Auto-correction ──
- name: Disable automatic spelling correction
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticSpellingCorrectionEnabled
    type: bool
    value: false

- name: Disable automatic capitalization
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticCapitalizationEnabled
    type: bool
    value: false

- name: Disable smart dashes
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticDashSubstitutionEnabled
    type: bool
    value: false

- name: Disable automatic period substitution
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticPeriodSubstitutionEnabled
    type: bool
    value: false

- name: Disable smart quotes
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticQuoteSubstitutionEnabled
    type: bool
    value: false

# ── Trackpad ──
- name: Enable tap to click (trackpad driver)
  community.general.osx_defaults:
    domain: com.apple.driver.AppleBluetoothMultitouch.trackpad
    key: Clicking
    type: int
    value: 1

- name: Enable tap to click (current host)
  community.general.osx_defaults:
    host: currentHost
    domain: NSGlobalDomain
    key: com.apple.mouse.tapBehavior
    type: int
    value: 1

- name: Enable tap to click (global)
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: com.apple.mouse.tapBehavior
    type: int
    value: 1

# ── Key repeat ──
- name: Disable press-and-hold for keys (enable key repeat)
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: ApplePressAndHoldEnabled
    type: bool
    value: false

- name: Read current KeyRepeat
  ansible.builtin.shell: defaults read NSGlobalDomain KeyRepeat 2>/dev/null || echo missing
  register: key_repeat_current
  changed_when: false

# osx_defaults module fails on type mismatch (some macOS versions store
# this as float). Write via raw `defaults` to bypass type-checking.
- name: Set fast key repeat rate
  ansible.builtin.command: defaults write NSGlobalDomain KeyRepeat -int 1
  when: (key_repeat_current.stdout | trim) != "1"

- name: Read current InitialKeyRepeat
  ansible.builtin.shell: defaults read NSGlobalDomain InitialKeyRepeat 2>/dev/null || echo missing
  register: initial_key_repeat_current
  changed_when: false

- name: Set short initial key repeat delay
  ansible.builtin.command: defaults write NSGlobalDomain InitialKeyRepeat -int 10
  when: (initial_key_repeat_current.stdout | trim) != "10"
