---
# ── Widgets ──
- name: Hide desktop widgets
  community.general.osx_defaults:
    domain: com.apple.WindowManager
    key: StandardHideWidgets
    type: int
    value: 1

- name: Hide Stage Manager widgets
  community.general.osx_defaults:
    domain: com.apple.WindowManager
    key: StageManagerHideWidgets
    type: int
    value: 1

# ── Click wallpaper behavior ──
- name: "Click wallpaper to show desktop: Only in Stage Manager"
  community.general.osx_defaults:
    domain: com.apple.WindowManager
    key: EnableStandardClickToShowDesktop
    type: bool
    value: false

# ── Appearance ──
- name: "Appearance: Auto (light/dark)"
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: AppleInterfaceStyleSwitchesAutomatically
    type: bool
    value: true

- name: "Icon & widget style: Dark + Auto"
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: AppleIconAppearanceTheme
    type: string
    value: RegularAutomatic

# ── Accessibility ──
- name: Enable reduce motion
  community.general.osx_defaults:
    domain: com.apple.Accessibility
    key: ReduceMotionEnabled
    type: int
    value: 1

# ── Keyboard ──
- name: Enable full keyboard access (NSGlobalDomain)
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: AppleKeyboardUIMode
    type: int
    value: 3

- name: Enable full keyboard access (Accessibility)
  community.general.osx_defaults:
    domain: com.apple.Accessibility
    key: FullKeyboardAccessEnabled
    type: int
    value: 1

- name: Enable full keyboard access (universalaccess)
  community.general.osx_defaults:
    domain: com.apple.universalaccess
    key: keyboardAccessEnabled
    type: int
    value: 1

- name: Set keyboard access passthrough mode
  community.general.osx_defaults:
    domain: com.apple.universalaccess
    key: keyboardAccessPassthroughMode
    type: int
    value: 0

- name: Enable accessibility
  community.general.osx_defaults:
    domain: com.apple.Accessibility
    key: AccessibilityEnabled
    type: int
    value: 1

- name: Enable application accessibility
  community.general.osx_defaults:
    domain: com.apple.Accessibility
    key: ApplicationAccessibilityEnabled
    type: int
    value: 1

# ── Window animations ──
- name: Disable window opening/closing animations
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticWindowAnimationsEnabled
    type: bool
    value: false

- name: Speed up window resize animations
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSWindowResizeTime
    type: float
    value: 0.001

# ── Siri ──
- name: Disable Siri
  community.general.osx_defaults:
    domain: com.apple.assistant.support
    key: "Assistant Enabled"
    type: bool
    value: false

# ── Wallpaper ──
- name: Set wallpaper to Space Gray Pro
  ansible.builtin.command: >
    osascript -e 'tell application "System Events" to tell every desktop
    to set picture to "/System/Library/Desktop Pictures/Solid Colors/Space Gray Pro.png"'
  changed_when: true
