---
# ── Widgets ──
- name: Hide desktop widgets
  community.general.osx_defaults:
    domain: com.apple.WindowManager
    key: StandardHideWidgets
    type: int
    value: 1

- name: Hide Stage Manager widgets
  community.general.osx_defaults:
    domain: com.apple.WindowManager
    key: StageManagerHideWidgets
    type: int
    value: 1

# ── Click wallpaper behavior ──
- name: "Click wallpaper to show desktop: Only in Stage Manager"
  community.general.osx_defaults:
    domain: com.apple.WindowManager
    key: EnableStandardClickToShowDesktop
    type: bool
    value: false

# ── Accessibility ──
- name: Reduce motion
  community.general.osx_defaults:
    domain: com.apple.universalaccess
    key: reduceMotion
    type: bool
    value: true

# ── Keyboard ──
- name: Enable full keyboard access
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: AppleKeyboardUIMode
    type: int
    value: 2

# ── Wallpaper ──
- name: Set wallpaper to Space Gray Pro
  ansible.builtin.command: >
    osascript -e 'tell application "System Events" to tell every desktop
    to set picture to "/System/Library/Desktop Pictures/Solid Colors/Space Gray Pro.png"'
  changed_when: true
