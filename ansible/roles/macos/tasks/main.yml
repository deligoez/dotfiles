---
# Hostname and timezone are set by bootstrap.sh (needs sudo)

# ── Manual prerequisites ──

- name: Check App Management permission for Terminal
  ansible.builtin.shell: >
    sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db"
    "SELECT allowed FROM access WHERE service='kTCCServiceAppManagement'
    AND client='com.apple.Terminal';" 2>/dev/null
  register: app_mgmt_check
  changed_when: false
  failed_when: false
  become: true
  tags: [macos-defaults]

- name: Prompt for App Management permission
  ansible.builtin.pause:
    prompt: >-
      ⚠️  Terminal.app needs App Management permission.
      Please go to System Settings > Privacy & Security > App Management
      and enable Terminal.app, then press Enter to continue
  when: app_mgmt_check.stdout != "1"
  tags: [macos-defaults]

# ── macOS settings first (fast, no dependencies) ──

- name: Apply locale settings
  ansible.builtin.include_tasks: locale.yml
  tags: [locale, macos-defaults]

- name: Apply desktop settings
  ansible.builtin.include_tasks: desktop.yml
  tags: [desktop, macos-defaults]

- name: Apply menu bar settings
  ansible.builtin.include_tasks: menubar.yml
  tags: [menubar, macos-defaults]

- name: Apply input settings
  ansible.builtin.include_tasks: input.yml
  tags: [input, macos-defaults]

- name: Apply finder settings
  ansible.builtin.include_tasks: finder.yml
  tags: [finder, macos-defaults]

- name: Apply dock settings
  ansible.builtin.include_tasks: dock.yml
  tags: [dock, macos-defaults]

- name: Apply app settings
  ansible.builtin.include_tasks: apps.yml
  tags: [apps, macos-defaults]

# ── Homebrew packages last (slow, may have failures) ──

- name: Install Homebrew packages
  ansible.builtin.include_tasks: homebrew.yml
  tags: [homebrew]

# ── Default apps (after packages are installed) ──

- name: Set default applications
  ansible.builtin.include_tasks: defaults.yml
  tags: [defaults]

# ── Shell setup (after fish is installed) ──

- name: Set default shell
  ansible.builtin.include_tasks: shell.yml
  tags: [shell]

# ── SSH keys (before chezmoi — needed to clone private repo) ──

- name: Setup SSH keys
  ansible.builtin.include_tasks: ssh.yml
  tags: [ssh]

# ── Config files via chezmoi (after SSH for private repo access) ──

- name: Apply dotfile configs
  ansible.builtin.include_tasks: chezmoi.yml
  tags: [chezmoi]

# ── Codegraff / muonry (after chezmoi for credentials symlink) ──

- name: Install codegraff
  ansible.builtin.include_tasks: codegraff.yml
  tags: [codegraff]

# ── Composer global packages (after PHP is installed) ──

- name: Install Composer global packages
  ansible.builtin.include_tasks: composer-packages.yml
  tags: [composer]

# ── npm global packages (after Node is installed) ──

- name: Install global npm packages
  ansible.builtin.include_tasks: npm-packages.yml
  tags: [npm]

# ── Agent skills (after chezmoi deploys skill-lock.json) ──

- name: Install agent skills
  ansible.builtin.include_tasks: skills.yml
  tags: [skills]

# ── Repo bootstrap (after SSH keys for private repo access) ──

- name: Bootstrap repos with rp
  ansible.builtin.include_tasks: rp-bootstrap.yml
  tags: [rp]
