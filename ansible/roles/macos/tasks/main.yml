---
# Hostname and timezone are set by bootstrap.sh (needs sudo)

# ── macOS settings first (fast, no dependencies) ──

- name: Apply locale settings
  ansible.builtin.include_tasks: locale.yml
  tags: [locale]

- name: Apply desktop settings
  ansible.builtin.include_tasks: desktop.yml
  tags: [desktop]

- name: Apply menu bar settings
  ansible.builtin.include_tasks: menubar.yml
  tags: [menubar]

- name: Apply input settings
  ansible.builtin.include_tasks: input.yml
  tags: [input]

- name: Apply finder settings
  ansible.builtin.include_tasks: finder.yml
  tags: [finder]

- name: Apply dock settings
  ansible.builtin.include_tasks: dock.yml
  tags: [dock]

- name: Apply app settings
  ansible.builtin.include_tasks: apps.yml
  tags: [apps]

# ── Homebrew packages last (slow, may have failures) ──

- name: Install Homebrew packages
  ansible.builtin.include_tasks: homebrew.yml
  tags: [homebrew]

# ── Shell setup (after fish is installed) ──

- name: Set default shell
  ansible.builtin.include_tasks: shell.yml
  tags: [shell]

# ── Config files via chezmoi (after packages are installed) ──

- name: Apply dotfile configs
  ansible.builtin.include_tasks: chezmoi.yml
  tags: [chezmoi]
