---
- name: Close System Settings to prevent override
  ansible.builtin.command: osascript -e 'tell application "System Settings" to quit'
  changed_when: false
  failed_when: false

- name: Check current Dock apps
  ansible.builtin.shell: defaults read com.apple.dock persistent-apps | grep '_CFURLString' | sed 's/.*"\(.*\)".*/\1/'
  register: dock_apps
  changed_when: false

- name: Set Dock apps to Messages only
  ansible.builtin.shell: |
    defaults write com.apple.dock persistent-apps -array \
      '<dict>
        <key>tile-data</key>
        <dict>
          <key>file-data</key>
          <dict>
            <key>_CFURLString</key>
            <string>/System/Applications/Messages.app</string>
            <key>_CFURLStringType</key>
            <integer>0</integer>
          </dict>
        </dict>
      </dict>'
  when: dock_apps.stdout_lines | map('trim') | list != ['/System/Applications/Messages.app']
  notify: Restart Dock

- name: Set Dock icon size to 50px
  community.general.osx_defaults:
    domain: com.apple.dock
    key: tilesize
    type: float
    value: 50
  notify: Restart Dock

- name: Disable opening application animation
  community.general.osx_defaults:
    domain: com.apple.dock
    key: launchanim
    type: bool
    value: false
  notify: Restart Dock

- name: Auto-hide Dock
  community.general.osx_defaults:
    domain: com.apple.dock
    key: autohide
    type: bool
    value: true
  notify: Restart Dock

- name: Hide recent applications in Dock
  community.general.osx_defaults:
    domain: com.apple.dock
    key: show-recents
    type: bool
    value: false
  notify: Restart Dock

- name: Speed up Mission Control animations
  community.general.osx_defaults:
    domain: com.apple.dock
    key: expose-animation-duration
    type: float
    value: 0.1
  notify: Restart Dock

- name: Disable auto-rearrange Spaces by recent use
  community.general.osx_defaults:
    domain: com.apple.dock
    key: mru-spaces
    type: bool
    value: false
  notify: Restart Dock

# ── Hot Corners (all disabled) ──
# Corner keys: 0=no action, 2=Mission Control, 3=App Windows, 4=Desktop,
# 5=Start Screen Saver, 6=Disable Screen Saver, 10=Display Sleep,
# 11=Launchpad, 12=Notification Center, 13=Lock Screen, 14=Quick Note.
# Modifier keys: 0=none.

- name: Disable all hot corners
  community.general.osx_defaults:
    domain: com.apple.dock
    key: "{{ item }}"
    type: int
    value: 0
  loop:
    - wvous-tl-corner
    - wvous-tl-modifier
    - wvous-tr-corner
    - wvous-tr-modifier
    - wvous-bl-corner
    - wvous-bl-modifier
    - wvous-br-corner
    - wvous-br-modifier
  notify: Restart Dock

# Flush handler immediately so Dock restarts before Homebrew starts
- name: Apply Dock changes now
  ansible.builtin.meta: flush_handlers
