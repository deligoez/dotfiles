---
- name: Check if skill-lock.json exists
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.agents/.skill-lock.json"
  register: skill_lock

- name: Read skill-lock.json
  ansible.builtin.slurp:
    src: "{{ ansible_facts.env.HOME }}/.agents/.skill-lock.json"
  register: skill_lock_content
  when: skill_lock.stat.exists

- name: Parse desired skills from lock file
  ansible.builtin.set_fact:
    desired_skills: >-
      {{ (skill_lock_content.content | b64decode | from_json).skills
         | dict2items
         | map(attribute='value.sourceUrl')
         | list }}
  when: skill_lock.stat.exists

- name: Check if skills directory exists
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.agents/skills"
  register: skills_dir

- name: Get installed skill directories
  ansible.builtin.find:
    paths: "{{ ansible_facts.env.HOME }}/.agents/skills"
    file_type: directory
    depth: 1
  register: installed_skills
  when: skill_lock.stat.exists and skills_dir.stat.exists and skills_dir.stat.isdir

- name: Build installed skills name set
  ansible.builtin.set_fact:
    installed_skill_names: "{{ (installed_skills.files | default([])) | map(attribute='path') | map('basename') | list }}"
  when: skill_lock.stat.exists

- name: Compute missing skills (not yet cloned)
  ansible.builtin.set_fact:
    missing_skills: >-
      {{ (skill_lock_content.content | b64decode | from_json).skills
         | dict2items
         | rejectattr('key', 'in', installed_skill_names)
         | map(attribute='value.sourceUrl')
         | list }}
  when: skill_lock.stat.exists

- name: Install missing skills via npx
  ansible.builtin.command: /opt/homebrew/bin/npx -y skills add -g -y {{ item }}
  environment:
    PATH: "/opt/homebrew/bin:/opt/homebrew/sbin:{{ ansible_facts.env.PATH }}"
  loop: "{{ missing_skills | default([]) }}"
  when: skill_lock.stat.exists and (missing_skills | default([])) | length > 0
  changed_when: true
