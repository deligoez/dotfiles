# Clone dotfiles-private into a hidden location.
# chezmoi manages ~/.config/rp/manifest.yaml as a symlink to the file in this repo.
.local/share/dotfiles-private:
  type: git-repo
  url: git@github.com:deligoez/dotfiles-private.git
  refreshPeriod: 24h

# Clone theme repo (public). Symlinks point to theme files in this cache.
.local/share/deligoez-theme:
  type: git-repo
  url: https://github.com/deligoez/deligoez-theme.git
  refreshPeriod: 168h
