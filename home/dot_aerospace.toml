# ~/.aerospace.toml
# AeroSpace configuration — STRUCTURAL only.
# All keybindings live in karabiner.edn and reach AeroSpace via
# Karabiner shell_command → `aerospace …` CLI.
#
# Docs: https://nikitabobko.github.io/AeroSpace/guide

start-at-login = true
auto-reload-config = true

# Default tile orientation: AeroSpace decides based on container shape.
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Don't snap mouse to focused window on focus change.
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Smooth focus across stacked monitors (focus_down at bottom edge of
# top monitor crosses to lower monitor, etc.).
on-focus-changed = []

# Workspace-to-monitor force assignment is intentionally OMITTED:
# free-floating workspaces follow the focused monitor, which behaves
# better when the laptop disconnects from the external monitors.
#
# If/when fixed assignment becomes desirable, populate:
# [workspace-to-monitor-force-assignment]
# 1 = 'main'
# 6 = 'secondary'
# ...

# Gaps (visual breathing room between tiles, in pixels).
[gaps]
inner.horizontal = 6
inner.vertical = 6
outer.left = 6
outer.right = 6
outer.top = 6
outer.bottom = 6

# Bindings table is left empty on purpose — Karabiner drives the CLI.
[mode.main.binding]
# (no native bindings)
